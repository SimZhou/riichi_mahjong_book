site_name: 麻将入门教程
site_url: https://simzhou.com/mahjong_beginner/
use_directory_urls: false

theme:
  name: material
  language: zh
  features:
    - navigation.indexes
    - navigation.top

markdown_extensions:
  - tables
  - attr_list

extra_css:
  - stylesheets/extra.css

nav:
  - 首页: index.md
  - 麻将基础:
    - 栏目导读: kihon/index.md
    - 麻将是什么: kihon/kihon01.md
    - 麻将与概率: kihon/kihon02.md
    - 听牌与向听: kihon/kihon03.md
    - 面子与搭子: kihon/kihon04.md
    - 数牌与字牌: kihon/kihon05.md
    - 对子（1）: kihon/kihon06.md
    - 对子（2）: kihon/kihon07.md
    - 基本形与复合形: kihon/kihon08.md
    - 复合形（1）: kihon/kihon09.md
    - 复合形（2）: kihon/kihon10.md
    - 麻将的听牌（1）: kihon/kihon11.md
    - 麻将的听牌（2）: kihon/kihon12.md
  - 牌理与牌效率:
    - 栏目导读: pairi/index.md
    - 按牌理打牌: pairi/pairi01.md
    - 有效牌与枚数: pairi/pairi02.md
    - 浮牌理论: pairi/pairi03.md
    - 搭子理论（1）: pairi/pairi04.md
    - 搭子理论（2）: pairi/pairi05.md
    - 搭子理论（3）: pairi/pairi06.md
    - 打牌选择思路: pairi/pairi07.md
    - 初期牌理（1）: pairi/pairi08.md
    - 初期牌理（2）: pairi/pairi09.md
    - 两向听牌理（1）: pairi/pairi10.md
    - 两向听牌理（2）: pairi/pairi11.md
    - 两向听牌理（3）: pairi/pairi12.md
