site_name: "日麻: 从入门到精通"
site_url: https://simzhou.com/riichi_mahjong_book/
site_description: 面向初学者的日式麻将中文教程，系统讲解麻将基础、牌效率、役种、宝牌、鸣牌、立直、防守、局势判断与押引。
site_author: SimZhou
use_directory_urls: false

theme:
  name: material
  language: zh
  custom_dir: overrides
  features:
    - navigation.indexes
    - navigation.top

markdown_extensions:
  - meta
  - tables
  - attr_list

extra_css:
  - stylesheets/extra.css

